{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PONTO — Entrar</title>
<link rel="icon" type="image/png" href="{% static 'gestao/img/favicon.png' %}">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #1a0a0a;
    overflow: hidden;
}

/* Fundo com padrão de bordado */
.bg-bordado {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
        radial-gradient(ellipse at 20% 50%, rgba(220,53,69,0.25) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(220,53,69,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(180,30,50,0.2) 0%, transparent 50%),
        #1a0a0a;
}

/* Padrão de linhas de bordado SVG no fundo */
.bg-bordado::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.07;
    background-image:
        repeating-linear-gradient(
            45deg,
            #dc3545 0px, #dc3545 1px,
            transparent 1px, transparent 18px
        ),
        repeating-linear-gradient(
            -45deg,
            #dc3545 0px, #dc3545 1px,
            transparent 1px, transparent 18px
        );
}

/* Pontos decorativos de agulha */
.bg-bordado::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.12;
    background-image: radial-gradient(circle, #dc3545 1px, transparent 1px);
    background-size: 24px 24px;
}

.login-card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.97);
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
}

.logo-wrap {
    text-align: center;
    margin-bottom: 32px;
}

.logo-wrap img {
    height: 48px;
}

.form-control {
    border: 1.5px solid #e9ecef;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 15px;
    transition: border-color .2s, box-shadow .2s;
}
.form-control:focus {
    border-color: #dc3545;
    box-shadow: 0 0 0 3px rgba(220,53,69,0.12);
}

.btn-login {
    background: #dc3545;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: 700;
    font-size: 15px;
    padding: 13px;
    width: 100%;
    transition: background .2s, transform .1s;
}
.btn-login:hover  { background: #c82333; transform: translateY(-1px); }
.btn-login:active { transform: translateY(0); }

.divider {
    text-align: center;
    color: #adb5bd;
    font-size: 13px;
    margin: 8px 0 16px;
    position: relative;
}

.alert-erro {
    background: #fff5f5;
    border: 1.5px solid #f5c6cb;
    border-radius: 10px;
    color: #842029;
    padding: 12px 16px;
    font-size: 14px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Agulha decorativa no canto */
.agulha-deco {
    position: fixed;
    bottom: -20px;
    right: -20px;
    opacity: 0.06;
    z-index: 0;
    pointer-events: none;
}
</style>
</head>
<body>

<div class="bg-bordado"></div>

<!-- Agulha decorativa grande no canto -->
<svg class="agulha-deco" width="400" height="400" viewBox="0 0 100 100">
    <line x1="10" y1="90" x2="80" y2="10" stroke="#dc3545" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="18" cy="82" rx="5" ry="8" transform="rotate(-45 18 82)"
             fill="none" stroke="#dc3545" stroke-width="3"/>
    <line x1="5"  y1="95" x2="80" y2="10" stroke="#dc3545" stroke-width="1.5"
          stroke-dasharray="3 4" stroke-linecap="round"/>
</svg>

<div class="login-card">

    <div class="logo-wrap">
        <img src="{% static 'gestao/img/ponto-logo.svg' %}" alt="PONTO">
        <p class="text-muted small mt-2 mb-0">Sistema de Gestão de Bordados</p>
    </div>

    {% if form.errors %}
    <div class="alert-erro">
        <i class="bi bi-exclamation-circle-fill"></i>
        Usuário ou senha incorretos. Tente novamente.
    </div>
    {% endif %}

    {% if messages %}
        {% for msg in messages %}
        <div class="alert-erro" style="background:#fff8e1; border-color:#ffe082; color:#856404;">
            <i class="bi bi-info-circle-fill"></i> {{ msg }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div class="mb-3">
            <label class="form-label fw-bold small text-muted">USUÁRIO</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Digite seu usuário" autofocus autocomplete="username" required>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold small text-muted">SENHA</label>
            <div class="position-relative">
                <input type="password" name="password" id="inp-senha" class="form-control"
                       placeholder="••••••••" autocomplete="current-password" required>
                <button type="button" onclick="toggleSenha()"
                        style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                               background:none;border:none;color:#adb5bd;cursor:pointer;padding:0;">
                    <i class="bi bi-eye" id="ico-olho"></i>
                </button>
            </div>
        </div>

        <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" name="remember" id="lembrar">
            <label class="form-check-label small text-muted" for="lembrar">
                Lembrar de mim
            </label>
        </div>

        <button type="submit" class="btn-login">
            Entrar no Sistema
        </button>
    </form>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script>
function toggleSenha() {
    const inp = document.getElementById('inp-senha');
    const ico = document.getElementById('ico-olho');
    if (inp.type === 'password') {
        inp.type = 'text';
        ico.className = 'bi bi-eye-slash';
    } else {
        inp.type = 'password';
        ico.className = 'bi bi-eye';
    }
}
</script>
</body>
</html>
