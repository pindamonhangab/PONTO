<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 46" height="46">
  <!-- Spool flanges -->
  <rect x="0" y="0"  width="44" height="9" rx="4.5" fill="#DC3545"/>
  <rect x="0" y="37" width="44" height="9" rx="4.5" fill="#DC3545"/>
  <!-- Spool body -->
  <rect x="6" y="9" width="32" height="28" rx="2" fill="#DC3545" opacity="0.15"/>
  <!-- Thread wraps -->
  <line x1="10" y1="11" x2="24" y2="37" stroke="#DC3545" stroke-width="1.4" opacity="0.5"  stroke-linecap="round"/>
  <line x1="18" y1="11" x2="32" y2="36" stroke="#DC3545" stroke-width="1.4" opacity="0.35" stroke-linecap="round"/>
  <line x1="26" y1="11" x2="36" y2="30" stroke="#DC3545" stroke-width="1.4" opacity="0.25" stroke-linecap="round"/>
  <!-- Center hole -->
  <circle cx="22" cy="23" r="6"   fill="white"   stroke="#DC3545" stroke-width="1.5"/>
  <circle cx="22" cy="23" r="2.5" fill="#DC3545"/>
  <!-- Thread coming off spool -->
  <path d="M44 14 Q54 10 58 18 Q60 23 56 27" fill="none" stroke="#DC3545" stroke-width="2" stroke-linecap="round"/>
  <!-- Brand name -->
  <text x="68" y="34"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="32" font-weight="700"
        fill="#DC3545" letter-spacing="-1">PONTO</text>
</svg>
