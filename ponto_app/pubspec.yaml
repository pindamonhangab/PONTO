name: ponto_app
description: App de orçamento de bordados PONTO
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0
  dio: ^5.4.0

  # Câmera e imagem
  image_picker: ^1.0.7
  camera: ^0.10.5+9

  # Armazenamento local
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Compartilhar
  share_plus: ^7.2.2
  url_launcher: ^6.2.5

  # Outros
  intl: ^0.19.0
  flutter_image_compress: ^2.1.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
